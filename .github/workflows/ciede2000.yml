name: CIEDE2000 Test in Rust (64 bits)

on:
  workflow_dispatch:

env:
  n_csv_lines: 10000000

jobs:
  test-ciede2000-rust-64:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - name: 📦 Set up Rust and GCC
        run: |
          command -v cargo > /dev/null || {
            wget --no-verbose --no-check-certificate --timeout=5 --tries=2 "https://sh.rustup.rs" -O- |
            sh -s -- -y --no-modify-path --profile minimal
            for file in $HOME/.cargo/bin/*; do
              # Create symbolic links that integrate Rust into the system PATH
              sudo ln --backup --symbolic --verbose "$(readlink -f "$file")" "/usr/local/bin/${file##*/}"
            done
          }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: 🔧 Initialize Cargo project
        run: |
          rustc --version && cargo --version
          cargo new demo
          printf '%s\n' '' \
          'use std::env;' \
          'use std::fs::File;' \
          'use std::io::{self, BufRead, BufReader};' \
          '' > demo/src/main.rs
          cat ciede2000-64-bits.rs >> demo/src/main.rs
          printf '%s\n' '' \
          'fn main() -> io::Result<()> {' \
          '	let args: Vec<String> = env::args().collect();' \
          '	let filename = &args[1];' \
          '	let canonical = args.len() == 3;' \
          '	let file = File::open(filename)?;' \
          '	let reader = BufReader::new(file);' \
          '	for line in reader.lines() {' \
          '		let line = line?;' \
          "		let parts: Vec<&str> = line.split(',').collect();" \
          '		let vals: Vec<f64> = parts.iter()' \
          '			.map(|s| s.parse::<f64>().unwrap())' \
          '			.collect();' \
          '		let delta_e = ciede2000_with_parameters(vals[0], vals[1], vals[2], vals[3], vals[4], vals[5], vals[6], vals[7], vals[8], canonical);' \
          '		println!("{},{}", line.trim_end(), delta_e);' \
          '	}' \
          '	Ok(())' \
          '}' \
          '' >> demo/src/main.rs

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in Rust and stream to verifier
        run: |
          cargo run --manifest-path=demo/Cargo.toml --release -- test-cases.csv --canonical | ./ciede2000-native -o summary-canonical.txt &
          cargo run --manifest-path=demo/Cargo.toml --release -- test-cases.csv | ./ciede2000-native -o summary-simplified.txt &
          wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
